apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  labels:
    app.kubernetes.io/instance: agent-forge-operator
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: agent-forge-operator
    app.kubernetes.io/version: v1.0.0
    helm.sh/chart: agent-forge-operator-1.0.0
    monitoring.syn.tools/enabled: 'true'
    prometheus: main
    role: alert-rules
  name: agent-forge-operator
  namespace: syn-agent-forge-operator
spec:
  groups:
    - name: agent-forge-operator
      rules:
        - alert: AgentForgeVSphereVMOperationFailures
          annotations:
            summary: Agent Forge vSphere VM operations are failing
          expr: increase(agent_forge_vsphere_vm_operations_total{result="error"}[5m])
            > 0
          for: 5m
          labels:
            severity: warning
        - alert: AgentForgeISOOperationFailures
          annotations:
            summary: Agent Forge InfraEnv ISO operations are failing
          expr: increase(agent_forge_iso_operations_total{result="error"}[5m]) > 0
          for: 5m
          labels:
            severity: warning
