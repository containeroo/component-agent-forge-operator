apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/instance: agent-forge-operator
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: agent-forge-operator
    app.kubernetes.io/version: v1.1.0
    helm.sh/chart: agent-forge-operator-1.1.0
  name: vsphereagentpool-admin-role
rules:
  - apiGroups:
      - agent-forge.containeroo.ch
    resources:
      - vsphereagentpools
      - vsphereagents
    verbs:
      - '*'
  - apiGroups:
      - agent-forge.containeroo.ch
    resources:
      - vsphereagentpools/status
      - vsphereagents/status
    verbs:
      - get
---
apiVersion: rbac.authorization.k8s.io/v1
