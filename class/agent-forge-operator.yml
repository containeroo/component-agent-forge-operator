---
parameters:
  kapitan:
    dependencies:
      - type: helm
        source: ${agent_forge_operator:charts:agent-forge-operator:source}
        chart_name: agent-forge-operator
        version: ${agent_forge_operator:charts:agent-forge-operator:version}
        output_path: ${_base_directory}/helmcharts/agent-forge-operator
    compile:
      - input_paths:
          - ${_base_directory}/component/app.jsonnet
        input_type: jsonnet
        output_path: .
      - input_paths:
          - ${_base_directory}/component/helm/agent-forge-operator.jsonnet
        input_type: jsonnet
        output_path: ${_base_directory}/helmcharts/agent-forge-operator
      - input_paths:
          - ${_base_directory}/helmcharts/agent-forge-operator
        input_type: helm
        output_type: yaml
        output_path: agent-forge-operator/10_agent_forge_operator_helmchart
        helm_values_files:
          - ${_base_directory}/helmcharts/agent-forge-operator/values-component.yaml
          - ${_base_directory}/helmcharts/agent-forge-operator/values-overrides.yaml
        helm_params:
          name: ${agent_forge_operator:name}
          namespace: ${agent_forge_operator:namespace}
      - input_paths:
          - ${_base_directory}/component/main.jsonnet
        input_type: jsonnet
        output_path: agent-forge-operator/
  commodore:
    postprocess:
      filters:
        - type: jsonnet
          path: agent-forge-operator/10_agent_forge_operator_helmchart/agent-forge-operator/crds
          filter: postprocess/drop_null_objects.jsonnet
