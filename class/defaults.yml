---
parameters:
  agent_forge_operator:
    name: agent-forge-operator
    namespace: syn-agent-forge-operator

    charts:
      agent-forge-operator:
        source: https://charts.containeroo.ch
        version: 0.2.0

    images:
      operator:
        repository: ghcr.io/containeroo/agent-forge-operator
        tag: v0.1.0

    monitoring_enabled: true

    helm_values:
      image: ${agent_forge_operator:images:operator}
